name: Deploy decks to GitHub Pages

# 只在「發佈 Release」時部署（穩妥：merge 進 main 不會自動公開），
# 外加手動觸發備用。Release 會 checkout 該 tag 的 commit → 部署的是被標記的確定狀態。
on:
  release:
    types: [published]
  workflow_dispatch:

# 讓 deploy-pages 取得 OIDC token、寫入 Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 同時只跑一個部署，新的取代排隊中的
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build (subpath = repo name)
        run: pnpm build
        env:
          # GitHub Pages 專案站路徑：https://<user>.github.io/<repo>/
          OSD_BASE: /${{ github.event.repository.name }}/

      # GitHub Pages 沒有 SPA fallback：把 index.html 複製成 404.html，
      # 讓 /s/<deck-id> 這種深層連結（Sites iframe 會直接打）不會 404。
      - name: SPA fallback for deep links
        run: cp dist/index.html dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
