name: Deploy decks to GitHub Pages

# 只在「發佈 Release」時部署（穩妥：merge 進 main 不會自動公開），外加手動觸發備用。
# Release 會 checkout 該 tag 的 commit → 部署的是被標記的確定狀態。
on:
  release:
    types: [published]
  workflow_dispatch:

# 讓 deploy-pages 取得 OIDC token、寫入 Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 同時只跑一個部署
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      kept: ${{ steps.filter.outputs.kept }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # 對齊本機 pnpm 主版本：pnpm-workspace.yaml 用了 allowBuilds（pnpm 10+ 語法），
          # pnpm 9 會誤判「packages field missing」而失敗。
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # pnpm 11 需要 Node >= 22.13（用到 node:sqlite）；對齊本機 Node 主版本
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # allowlist：只保留 deploy/public-decks.txt 列到的 deck，其餘在這個「拋棄式」CI checkout 刪掉
      # （不動 repo）。預設不公開；清單空 → kept=0 → 後面 build/部署整段跳過：
      # 不會覆蓋既有站、也不會外洩任何 deck。
      - name: Filter to allowlisted decks
        id: filter
        run: |
          LIST=deploy/public-decks.txt
          allow=$(grep -vE '^[[:space:]]*#|^[[:space:]]*$' "$LIST" 2>/dev/null | tr -d '\r' | sed 's/[[:space:]]//g' || true)
          kept=0
          for d in slides/*/; do
            [ -d "$d" ] || continue
            id=$(basename "$d")
            if printf '%s\n' "$allow" | grep -qx "$id"; then
              echo "publish : $id"; kept=$((kept+1))
            else
              echo "exclude : $id"; rm -rf "$d"
            fi
          done
          echo "kept=$kept" >> "$GITHUB_OUTPUT"
          echo "→ $kept deck(s) will be published"

      - name: Build (subpath = repo name)
        if: steps.filter.outputs.kept != '0'
        run: pnpm build
        env:
          # GitHub Pages 專案站路徑：https://<user>.github.io/<repo>/
          OSD_BASE: /${{ github.event.repository.name }}/

      # GitHub Pages 沒有 SPA fallback：把 index.html 複製成 404.html，
      # 讓 /s/<deck-id> 這種深層連結（Sites iframe 會直接打）不會 404。
      - name: SPA fallback for deep links
        if: steps.filter.outputs.kept != '0'
        run: cp dist/index.html dist/404.html

      - name: Configure Pages
        if: steps.filter.outputs.kept != '0'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: steps.filter.outputs.kept != '0'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    # 清單空（kept=0）就整個跳過部署
    if: needs.build.outputs.kept != '0'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
